<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Boreal & Bean</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>BOREAL & BEAN</h1>
        <p>Rooted in the North, Roasted for the Soul</p>
    </header>

    <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="story.html" class="nav-link">Our Story</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="checkout.html" class="nav-link">Checkout</a>
    </nav>

    <div class="section">
        <h2>Checkout</h2>
        
        <div class="cart" id="cart">
            <h3>Your Cart</h3>
            <div id="cart-items"></div>
            <hr style="margin:25px 0;">
            <h3>Total: <span id="total">CA$0.00</span></h3>
            <button onclick="proceedCheckout()">Proceed to Checkout</button>
        </div>

        <div class="demo-box" style="max-width:520px;">
            <h3>Payment Information</h3>
            <form>
                <label>Card Number</label><br><br>
                <input type="text" placeholder="1234 5678 9012 3456" style="width:100%; padding:14px;"><br><br>
                <label>Payment Method</label><br><br>
                <label><input type="radio" name="method"> Visa</label><br>
                <label><input type="radio" name="method"> Mastercard</label><br><br>
                <input type="submit" value="Pay Securely">
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Boreal & Bean • Rooted in the North, Roasted for the Soul</p>
    </footer>

    <script>
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            updateCart();
            alert(`Added: ${name}`);
        }
        function updateCart() {
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                itemsDiv.innerHTML += `<p>${index+1}. ${item.name} — CA$${item.price.toFixed(2)}</p>`;
            });
            document.getElementById('total').textContent = `CA$${total.toFixed(2)}`;
        }
        function proceedCheckout() {
            if (cart.length === 0) alert("Your cart is empty!");
            else alert("Thank you for your order at Boreal & Bean! 🌲☕");
        }
    </script>
</body>
</html>
